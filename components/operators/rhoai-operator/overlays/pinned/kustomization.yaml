apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Pinned RHOAI catalog overlay
# Uses a specific catalog image instead of floating nightly tag

resources:
  - ../../base

patches:
  - target:
      kind: CatalogSource
      name: rhoai-catalog-nightly
    patch: |-
      - op: replace
        path: /spec/image
        # Pinned to Dec 22 build
        value: quay.io/rhoai/rhoai-fbc-fragment:rhoai-3.2@sha256:c663ee23fac6c50e5befea097c68956dcc38144e82c6933a1788c050e95bcdb6
